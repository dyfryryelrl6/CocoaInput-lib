name: Build Windows ARM64 DLL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows-arm64:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC ARM64 toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Build libwincocoainput ARM64
        working-directory: src/win
        run: |
          nmake /f Makefile CC="cl.exe" CFLAGS="/D_USRDLL /D_WINDLL /LD /MACHINE:ARM64" TARGET="libwincocoainput_arm64.dll"

      - name: Upload ARM64 DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwincocoainput-arm64
          path: src/win/libwincocoainput_arm64.dll
